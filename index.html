<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>パパチェッカー</title>
<style>
  :root{
    --main:#3B82F6;
    --main-dark:#2563EB;
    --accent:#FF9F43;
    --bg:#F3F6FB;
    --card:#ffffff;
    --text:#26313f;
    --sub:#8a94a3;
    --border:#e6eaf1;
    --ok:#22C55E;
  }
  html[data-theme="dark"]{
    --bg:#121722;
    --card:#1c2330;
    --text:#e7ecf5;
    --sub:#8d97a8;
    --border:#2b3345;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);}
  #app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}

  header{background:linear-gradient(135deg,var(--main),var(--main-dark));color:#fff;padding:12px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  header #backBtn{border:none;background:rgba(255,255,255,.2);color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0;}
  header h1{margin:0;font-size:15.5px;font-weight:800;flex:1;letter-spacing:.02em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .headerBtns{display:flex;gap:4px;flex-shrink:0;}
  .headerBtns button{border:none;background:rgba(255,255,255,.2);color:#fff;width:30px;height:30px;border-radius:10px;font-size:14px;cursor:pointer;}
  .headerBtns button.on{background:#fff;color:var(--main-dark);}

  .view{flex:1;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch;padding:16px 14px 30px;}
  .view.active{display:block;}

  /* -------- Home -------- */
  .pointsCard{background:linear-gradient(135deg,var(--accent),#FFC97A);border-radius:18px;padding:15px 18px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;box-shadow:0 3px 10px rgba(255,159,67,.3);}
  .pointsCard .num{font-size:26px;font-weight:800;}
  .pointsCard .lbl{font-size:11px;opacity:.9;}
  .progressCard{background:var(--card);border-radius:20px;padding:22px 20px;text-align:center;box-shadow:0 2px 10px rgba(30,60,110,.06);margin-bottom:16px;}
  .progressCard .ring{width:130px;height:130px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--main) calc(var(--pct,0)*1%), var(--border) 0);}
  .progressCard .ringInner{width:104px;height:104px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .progressCard .ringInner .num{font-size:26px;font-weight:800;color:var(--main-dark);}
  .progressCard .ringInner .frac{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .progressCard .label{font-size:13.5px;color:var(--sub);font-weight:600;}
  .listTitle{font-size:12.5px;color:var(--sub);font-weight:700;margin:4px 2px 9px;}
  .itemRow{background:var(--card);border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(30,60,110,.05);}
  .itemRow .mark{font-size:22px;width:32px;text-align:center;flex-shrink:0;opacity:.35;}
  .itemRow.done .mark{opacity:1;}
  .itemRow .iname{flex:1;font-size:14px;font-weight:600;min-width:0;}
  .itemRow .badges{font-size:11px;flex-shrink:0;}
  .itemRow .streakBadge{font-size:10px;color:var(--accent);font-weight:700;flex-shrink:0;white-space:nowrap;}
  .itemRow .stateTxt{font-size:11px;font-weight:700;color:var(--sub);flex-shrink:0;white-space:nowrap;}
  .itemRow.done .stateTxt{color:var(--ok);}
  .itemRow .itemRight{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
  .itemRow .metaSub{font-size:9px;color:var(--sub);white-space:nowrap;}
  .readBadge{font-size:9px;font-weight:700;padding:4px 8px;border-radius:10px;flex-shrink:0;cursor:pointer;white-space:nowrap;border:none;}
  .readBadge.unread{background:#FEF3C7;color:#92600D;}
  .readBadge.read{background:#DCFCE7;color:#15803D;}
  .emptyNote{text-align:center;color:var(--sub);font-size:13px;padding:26px 0;}
  .rewardsSection{margin-top:6px;}
  .rewardItem{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(30,60,110,.05);}
  .rewardItem .rn{flex:1;font-size:13.5px;font-weight:700;min-width:0;}
  .rewardItem .rc{font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0;}
  .rewardItem button{border:none;border-radius:10px;padding:7px 11px;font-size:11.5px;font-weight:700;cursor:pointer;background:var(--main);color:#fff;flex-shrink:0;}
  .rewardItem button:disabled{background:var(--border);color:var(--sub);cursor:not-allowed;}

  /* -------- Special events -------- */
  .eventsSection{margin-top:2px;margin-bottom:16px;}
  .eventCard{background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(30,60,110,.05);}
  .eventHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
  .eventName{font-size:14px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .eventProg{font-size:11.5px;color:var(--sub);font-weight:700;flex-shrink:0;}
  .eventBar{height:7px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:10px;}
  .eventBarFill{height:100%;background:linear-gradient(90deg,var(--accent),#ffb977);border-radius:5px;transition:width .3s;}
  .eventTasks{display:flex;flex-direction:column;gap:6px;}
  .eventTaskRow{display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 9px;border-radius:10px;background:var(--bg);cursor:pointer;}
  .eventTaskRow.done{opacity:.55;text-decoration:line-through;}
  .etCheck{font-size:14px;flex-shrink:0;}
  .eventAdminBlock{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .eventAdminBlock:last-child{border-bottom:none;margin-bottom:0;}
  .eventTaskAdmin{padding:9px 2px 0;}
  .addTaskRow{display:flex;gap:6px;margin-bottom:8px;}
  .addTaskRow input{flex:1;border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:12.5px;background:var(--bg);color:var(--text);}
  .addTaskRow button{border:none;background:var(--main);color:#fff;border-radius:10px;padding:0 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .taskListAdmin{display:flex;flex-direction:column;gap:5px;}
  .taskAdminRow{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:5px 3px;}
  .taskDelBtn{border:none;background:#fdecea;color:#e2453c;width:22px;height:22px;border-radius:7px;font-size:10px;cursor:pointer;flex-shrink:0;}

  /* -------- Kid view -------- */
  .holdCard{position:relative;background:var(--card);border-radius:18px;padding:15px;margin-bottom:11px;overflow:hidden;box-shadow:0 2px 8px rgba(30,60,110,.06);user-select:none;-webkit-user-select:none;}
  .holdCard .fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:linear-gradient(90deg,#DBEAFE,#BFDBFE);z-index:0;transition:width .05s linear;}
  html[data-theme="dark"] .holdCard .fill{background:linear-gradient(90deg,#1e3a5f,#254a75);}
  .holdCard.done .fill{background:linear-gradient(90deg,#DCFCE7,#BBF7D0);}
  html[data-theme="dark"] .holdCard.done .fill{background:linear-gradient(90deg,#14432a,#1c5c39);}
  .holdCard .row{position:relative;z-index:1;display:flex;align-items:center;gap:11px;}
  .holdCard .mark{font-size:28px;width:38px;text-align:center;flex-shrink:0;}
  .holdCard .info{flex:1;min-width:0;}
  .holdCard .iname{font-size:15px;font-weight:700;}
  .holdCard .hint{font-size:10.5px;color:var(--sub);margin-top:2px;}
  .holdCard.done .hint{color:var(--ok);font-weight:700;}
  .holdCard .streakInfo{font-size:10px;color:var(--accent);font-weight:700;margin-top:2px;}
  .holdCard .checkBadge{font-size:19px;flex-shrink:0;opacity:.25;}
  .holdCard.done .checkBadge{opacity:1;}
  .kidTopNote{background:#FFF4E5;color:#9A5B00;font-size:12px;padding:9px 12px;border-radius:12px;margin-bottom:13px;text-align:center;}

  /* -------- Segmented toggle (calendar/report) -------- */
  .segToggle{display:flex;gap:6px;margin-bottom:14px;}
  .segBtn{flex:1;padding:9px;border:none;border-radius:12px;background:var(--card);color:var(--sub);font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 1px 3px rgba(30,60,110,.05);}
  .segBtn.on{background:var(--main);color:#fff;}

  /* -------- Calendar -------- */
  .calHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
  .calHeader .monthTitle{font-size:15px;font-weight:800;flex:1;text-align:center;}
  .calHeader .navBtns{display:flex;gap:6px;align-items:center;}
  .calHeader button{border:none;background:var(--card);width:30px;height:30px;border-radius:10px;font-size:14px;cursor:pointer;box-shadow:0 1px 3px rgba(30,60,110,.08);color:var(--text);flex-shrink:0;}
  .calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .calWeekday{text-align:center;font-size:10.5px;color:var(--sub);font-weight:700;padding-bottom:4px;}
  .calWeekday.sun{color:#e2453c;}
  .calWeekday.sat{color:#3B82F6;}
  .calCell{background:var(--card);border-radius:9px;min-height:60px;padding:3px 2px;box-shadow:0 1px 3px rgba(30,60,110,.05);cursor:pointer;}
  .calCell.blank{background:transparent;box-shadow:none;cursor:default;}
  .calCell.today{outline:2px solid var(--main);outline-offset:-2px;}
  .calCell .dnum{font-size:10.5px;font-weight:700;text-align:center;color:var(--text);}
  .calCell.holiday .dnum{color:#e2453c;}
  .calCell .hname{font-size:7px;color:#e2453c;text-align:center;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .calCell .chips{display:flex;flex-direction:column;gap:1px;margin-top:2px;}
  .chip{background:#EFF6FF;color:var(--main-dark);border-radius:5px;padding:1px 2px;font-size:7.5px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  html[data-theme="dark"] .chip{background:#1e3a5f;color:#bcd6ff;}
  .calLegend{display:flex;gap:12px;justify-content:center;margin-top:14px;font-size:10.5px;color:var(--sub);flex-wrap:wrap;}
  .calLegend span{display:flex;align-items:center;gap:3px;}

  /* -------- Report -------- */
  .reportPeriodToggle{display:flex;gap:6px;margin-bottom:14px;}
  .reportStats{display:flex;gap:10px;margin-bottom:16px;}
  .statBox{flex:1;background:var(--card);border-radius:14px;padding:13px;text-align:center;box-shadow:0 1px 3px rgba(30,60,110,.05);}
  .statNum{font-size:20px;font-weight:800;color:var(--main-dark);}
  .statLabel{font-size:10.5px;color:var(--sub);margin-top:2px;}
  .barChart{display:flex;align-items:flex-end;gap:3px;height:140px;background:var(--card);border-radius:14px;padding:12px 6px;box-shadow:0 1px 3px rgba(30,60,110,.05);overflow-x:auto;}
  .barCol{flex:1;min-width:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .barCol .bar{width:70%;background:linear-gradient(180deg,var(--main),var(--main-dark));border-radius:3px 3px 0 0;min-height:2px;}
  .barCol .barLabel{font-size:7px;color:var(--sub);margin-top:3px;white-space:nowrap;}

  /* -------- Admin -------- */
  #adminLoginBox{display:flex;flex-direction:column;align-items:center;padding:46px 10px;}
  #adminLoginBox .lockIcon{font-size:40px;margin-bottom:10px;}
  #adminLoginBox p{font-size:13px;color:var(--sub);margin:0 0 18px;}
  #adminLoginBox input{width:100%;max-width:220px;text-align:center;letter-spacing:.3em;font-size:19px;padding:12px;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;background:var(--card);color:var(--text);}
  #adminLoginBox input:focus{outline:2px solid var(--main);}
  #adminLoginBox button{padding:11px 28px;border:none;border-radius:14px;background:var(--main);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;}
  #adminLoginError{color:#e2453c;font-size:12px;margin-top:8px;height:14px;}

  .adminSection{background:var(--card);border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 1px 4px rgba(30,60,110,.05);}
  .adminSection h3{margin:0 0 11px;font-size:13.5px;color:var(--text);}
  .formRow{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
  .formRow label{font-size:11px;color:var(--sub);font-weight:700;}
  .formRow input,.formRow select{padding:10px 11px;border:1px solid var(--border);border-radius:10px;font-size:13.5px;background:var(--bg);color:var(--text);}
  .formRow input:focus,.formRow select:focus{outline:none;border-color:var(--main);}
  .formGrid{display:flex;gap:9px;}
  .formGrid .formRow{flex:1;}
  .adminSection > button.primary{width:100%;padding:11px;border:none;border-radius:12px;background:var(--main);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;margin-top:2px;}
  .weekdayChips{display:flex;gap:4px;}
  .wdChip{border:1px solid var(--border);background:var(--bg);border-radius:8px;width:28px;height:28px;font-size:10.5px;cursor:pointer;color:var(--sub);flex-shrink:0;}
  .wdChip.on{background:var(--main);color:#fff;border-color:var(--main);}
  .settingsPopupRow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;}
  .settingsPopupRow label.rowLabel{font-size:12.5px;color:var(--text);}
  .switch{position:relative;width:42px;height:24px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:.2s;}
  .slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--main);}
  .switch input:checked + .slider:before{transform:translateX(18px);}

  .adminItem{display:flex;align-items:center;gap:8px;padding:10px 4px;border-bottom:1px solid var(--border);}
  .adminItem:last-child{border-bottom:none;}
  .adminItem .mark{font-size:19px;width:26px;text-align:center;flex-shrink:0;}
  .adminItem .meta{flex:1;min-width:0;}
  .adminItem .meta .n{font-size:13px;font-weight:700;}
  .adminItem .meta .s{font-size:10px;color:var(--sub);}
  .adminItem .ops{display:flex;gap:4px;flex-shrink:0;}
  .adminItem .ops button{border:none;background:var(--bg);width:26px;height:26px;border-radius:8px;font-size:11px;cursor:pointer;color:var(--text);}
  .adminItem .ops button.del{background:#fdecea;color:#e2453c;}
  .resetBtn{width:100%;padding:11px;border:1px solid #f1c3c0;border-radius:12px;background:#fff5f4;color:#e2453c;font-weight:700;font-size:12.5px;cursor:pointer;}
  .exportBtn{width:100%;padding:11px;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-weight:700;font-size:12.5px;cursor:pointer;margin-top:8px;}
  .logoutAdminBtn{width:100%;padding:10px;border:none;background:none;color:var(--sub);font-size:12px;cursor:pointer;text-decoration:underline;margin-top:4px;}

  /* -------- Overlay / Modal -------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .overlay.center{align-items:center;}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);}
  .sheet.popup{border-radius:20px;max-width:340px;margin:0 16px;max-height:82vh;}
  .sheetHead{display:flex;align-items:center;justify-content:space-between;padding:15px 17px 8px;position:sticky;top:0;background:var(--card);}
  .sheetHead h3{margin:0;font-size:15px;color:var(--text);}
  .sheetHead button{border:none;background:var(--bg);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;color:var(--sub);}
  .sheetBody{padding:4px 17px 20px;}

  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <header>
    <button id="backBtn" style="display:none;">←</button>
    <h1 id="headerTitle">パパチェッカー</h1>
    <div class="headerBtns">
      <button id="navCalendar" title="カレンダー・レポート">📅</button>
      <button id="navDark" title="ダークモード">🌙</button>
      <button id="navAdmin" title="管理者">🔧</button>
      <button id="navKid" title="ぼく用">🧒</button>
    </div>
  </header>

  <!-- ホーム -->
  <div class="view active" id="view-home">
    <div class="pointsCard">
      <div><div class="lbl">ポイント</div><div class="num" id="homePointsNum">0</div></div>
      <div style="font-size:34px;">🏆</div>
    </div>
    <div class="progressCard">
      <div class="ring" id="progressRing" style="--pct:0;">
        <div class="ringInner">
          <div class="num" id="progressPct">0%</div>
          <div class="frac" id="progressFrac">0 / 0</div>
        </div>
      </div>
      <div class="label">きょうのがんばり</div>
    </div>
    <div class="listTitle">チェック項目</div>
    <div id="homeList"><div class="emptyNote">まだ項目がありません</div></div>
    <div class="eventsSection" id="eventsSection" style="display:none;">
      <div class="listTitle">🎉 特別イベント</div>
      <div id="eventsList"></div>
    </div>
    <div class="rewardsSection">
      <div class="listTitle">ごほうび交換</div>
      <div id="rewardsList"><div class="emptyNote">ごほうびはまだ登録されていません</div></div>
    </div>
  </div>

  <!-- ぼく用 -->
  <div class="view" id="view-kid">
    <div class="kidTopNote">できたら指でボタンを長押ししてね！</div>
    <div id="kidList"><div class="emptyNote">まだ項目がありません</div></div>
    <div class="eventsSection" id="kidEventsSection" style="display:none;">
      <div class="listTitle">🎉 特別イベント（タップでチェック）</div>
      <div id="kidEventsList"></div>
    </div>
  </div>

  <!-- カレンダー / レポート -->
  <div class="view" id="view-calendar">
    <div class="segToggle">
      <button class="segBtn on" id="segCal">📅 カレンダー</button>
      <button class="segBtn" id="segReport">📊 レポート</button>
    </div>
    <div id="calSubView">
      <div class="calHeader">
        <button id="calPrevBtn">‹</button>
        <div class="monthTitle" id="calMonthTitle">-</div>
        <div class="navBtns">
          <button id="calReloadBtn" title="更新">⟳</button>
          <button id="calNextBtn">›</button>
        </div>
      </div>
      <div class="calGrid" id="calWeekdaysRow"></div>
      <div class="calGrid" id="calGrid" style="margin-top:4px;"></div>
      <div class="calLegend"><span>🔴 祝日</span><span>🔵 きょう</span><span>タップで記録編集</span></div>
    </div>
    <div id="reportSubView" style="display:none;">
      <div class="reportPeriodToggle">
        <button class="segBtn on" id="repWeekBtn">週間（7日）</button>
        <button class="segBtn" id="repMonthBtn">月間（30日）</button>
      </div>
      <div class="reportStats">
        <div class="statBox"><div class="statNum" id="repTotalCount">0</div><div class="statLabel">合計回数</div></div>
        <div class="statBox"><div class="statNum" id="repPoints">0</div><div class="statLabel">獲得ポイント</div></div>
      </div>
      <div class="barChart" id="repBarChart"></div>
    </div>
  </div>

  <!-- 管理者 -->
  <div class="view" id="view-admin">
    <div id="adminLoginBox">
      <div class="lockIcon">🔒</div>
      <p>あんしょう番号を入力してください</p>
      <input type="password" id="adminPassInput" inputmode="numeric" maxlength="4" placeholder="••••">
      <button id="adminPassBtn">入る</button>
      <div id="adminLoginError"></div>
    </div>
    <div id="adminPanel" style="display:none;">
      <div class="adminSection">
        <h3 id="itemFormTitle">項目をついか</h3>
        <div class="formRow"><label>名前</label><input type="text" id="newItemName" placeholder="例）はみがき"></div>
        <div class="formGrid">
          <div class="formRow"><label>チェックのマーク</label><input type="text" id="newItemMark" maxlength="4" placeholder="⭕"></div>
          <div class="formRow"><label>長押しの秒数</label><input type="number" id="newItemHold" min="1" max="30" value="3"></div>
        </div>
        <div class="formRow"><label>ポイント（1回あたり）</label><input type="number" id="newItemPoints" min="0" value="1"></div>
        <div class="formRow"><label>やる曜日</label><div class="weekdayChips" id="newItemDays"></div></div>

/* ---------------- Firestore sync ---------------- */
function subscribeItems(){
  const q = query(collection(db,"papacheck_items"), orderBy("order","asc"));
  onSnapshot(q, snap => {
    items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    renderHome(); renderKid(); renderAdminList();
  });
}
function subscribeHistory(){
  const q = query(collection(db,"papacheck_history"), orderBy("dateStr","asc"));
  onSnapshot(q, snap => {
    historyMap = {};
    snap.forEach(d => {
      const h = d.data();
      if(!historyMap[h.dateStr]) historyMap[h.dateStr] = [];
      historyMap[h.dateStr].push({ docId:d.id, itemId:h.itemId, name:h.name, mark:h.mark, value:h.value ?? null, unit:h.unit || "", points:h.points ?? 1, photo:h.photo || null, confirmed: h.confirmed || false });
    });
    renderHome(); renderKid(); renderCalendar(); renderReport();
  });
}
function subscribeRewards(){
  const q = query(collection(db,"papacheck_rewards"), orderBy("cost","asc"));

}
function subscribeRedemptions(){

function subscribeEventTasks(){

function tasksForEvent(eventId){ return eventTasks.filter(t => t.eventId === eventId); }
async function toggleEventTask(taskId){

  await updateDoc(doc(db,"papacheck_event_tasks", t.id), { checked: !t.checked, checkedAt: serverTimestamp() });

function renderEventsInto(containerId, sectionId, interactive){

/* ---------------- Streak / totals / points ---------------- */
function itemDoneDatesSet(itemId){
  const s = new Set();
  Object.keys(historyMap).forEach(ds => { if(historyMap[ds].some(e => e.itemId === itemId)) s.add(ds); });
  return s;
}
function calcStreak(itemId){
  const set = itemDoneDatesSet(itemId);
  let d = new Date();
  let ds = todayStr(d);
  if(!set.has(ds)){ d.setDate(d.getDate()-1); ds = todayStr(d); }
  let streak = 0;
  while(set.has(ds)){ streak++; d.setDate(d.getDate()-1); ds = todayStr(d); }
  return streak;
}
function calcTotal(itemId){
  let count = 0;
  Object.values(historyMap).forEach(arr => { count += arr.filter(e => e.itemId === itemId).length; });
  return count;
}
function getBadges(streak, total){
  let b = "";
  if(streak>=30) b += "🏆"; else if(streak>=14) b += "🥇"; else if(streak>=7) b += "🥈"; else if(streak>=3) b += "🥉";
  if(total>=100) b += "💎"; else if(total>=50) b += "⭐"; else if(total>=10) b += "✨";
  return b;
}
function todaysEntryFor(itemId){
  const arr = historyMap[todayStr()] || [];
  return arr.find(e => e.itemId === itemId) || null;
}
async function toggleConfirmToday(itemId){
  const e = todaysEntryFor(itemId);
  if(!e || !e.docId) return;
  await updateDoc(doc(db,"papacheck_history", e.docId), { confirmed: !e.confirmed, confirmedAt: serverTimestamp() });
  toast(!e.confirmed ? "パパ既読にしたよ" : "未確認にもどしたよ");
}
function calcBalance(){
  let earned = 0;
  Object.values(historyMap).forEach(arr => arr.forEach(e => earned += (e.points||1)));
  let spent = redemptions.reduce((s,r)=>s+(r.cost||0),0);
  return earned - spent;
}

/* ---------------- Sound & confetti ---------------- */
function playSuccessSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.setValueAtTime(523.25, ctx.currentTime);
    o.frequency.setValueAtTime(783.99, ctx.currentTime+0.12);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
    o.start(); o.stop(ctx.currentTime+0.35);
  }catch(e){}
}
function burstConfetti(){
  const glyphs = ["🎉","✨","⭐","🎊"];
  for(let i=0;i<16;i++){
    const el = document.createElement("div");
    el.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    el.style.position="fixed"; el.style.left=(42+Math.random()*16)+"%"; el.style.top="50%";
    el.style.fontSize=(16+Math.random()*14)+"px"; el.style.zIndex=400; el.style.pointerEvents="none";
    el.style.transition="transform 1s ease-out, opacity 1s ease-out";
    document.body.appendChild(el);
    requestAnimationFrame(()=>{
      const dx=(Math.random()-0.5)*260, dy=-(110+Math.random()*180);
      el.style.transform = `translate(${dx}px, ${dy}px) rotate(${(Math.random()-0.5)*360}deg)`;
      el.style.opacity = "0";
    });
    setTimeout(()=>el.remove(), 1050);
  }
}

/* ---------------- Home ---------------- */
function renderHome(){
  const total = items.length;
  const done = items.filter(i => i.checked).length;
  const pct = total ? Math.round(done/total*100) : 0;
  $("progressRing").style.setProperty("--pct", pct);
  $("progressPct").textContent = pct + "%";
  $("progressFrac").textContent = done + " / " + total;
  $("homePointsNum").textContent = calcBalance() + "pt";

  const list = $("homeList");
  if(!items.length){ list.innerHTML = '<div class="emptyNote">まだ項目がありません（管理者画面でついかしてね）</div>'; }
  else {

      const row = document.createElement("div");

      const todayE = todaysEntryFor(it.id);
      let stateTxt = "まだ";
      if(it.checked){ stateTxt = (todayE && todayE.value != null) ? (todayE.value + (it.unit||todayE.unit||"")) : "できた！"; }

        <div class="itemRight"><div class="stateTxt">${esc(stateTxt)}</div><div class="metaSub">${badges}${streak>0?(" 🔥"+streak):""}</div></div>
        ${it.checked ? `<button class="readBadge ${todayE&&todayE.confirmed?'read':'unread'}" data-id="${it.id}">${todayE&&todayE.confirmed?'✅パパ既読':'👀未確認'}</button>` : ""}`;
      if(it.checked){ row.querySelector(".readBadge").addEventListener("click", () => toggleConfirmToday(it.id)); }
      list.appendChild(row);
    });
  }

  const rlist = $("rewardsList");
  if(!rewards.length){ rlist.innerHTML = '<div class="emptyNote">ごほうびはまだ登録されていません</div>'; renderEventsInto("eventsList", "eventsSection", true); return; }
  const balance = calcBalance();

  rewards.forEach(r => {
    const row = document.createElement("div"); row.className = "rewardItem";

    row.querySelector("button").addEventListener("click", async () => {
      if(calcBalance() < r.cost){ toast("ポイントが足りないよ"); return; }
      if(!confirm(r.name + " と交換しますか？（" + r.cost + "pt）")) return;
      await addDoc(collection(db,"papacheck_redemptions"), { rewardId:r.id, name:r.name, cost:r.cost, ts: serverTimestamp() });
      toast(r.name + " と交換したよ！🎁");
    });
    rlist.appendChild(row);
  });
  renderEventsInto("eventsList", "eventsSection", true);
}

/* ---------------- Kid view (hold to check) ---------------- */
function todaysWeekdayItems(){
  const wd = new Date().getDay();
  return items.filter(it => !it.days || it.days.length===0 || it.days.includes(wd));
}
function renderKid(){
  const list = $("kidList");
  const todays = todaysWeekdayItems();
  if(!todays.length){ list.innerHTML = '<div class="emptyNote">きょうの項目はありません</div>'; renderEventsInto("kidEventsList", "kidEventsSection", true); return; }
  list.innerHTML = "";
  todays.forEach(it => {
    const card = document.createElement("div");
    card.className = "holdCard" + (it.checked ? " done" : "");
    const streak = calcStreak(it.id);
    const total = calcTotal(it.id);
    const badges = getBadges(streak, total);
    const todayE = todaysEntryFor(it.id);
    let hint = (it.holdSeconds||3) + "秒 長押ししてね";
    if(it.checked){ hint = (todayE && todayE.value != null) ? ("できた！" + todayE.value + (it.unit||todayE.unit||"") + "（長押しでもどす）") : "できたよ！（長押しでもどす）"; }
    card.innerHTML = `<div class="fill"></div>
      <div class="row">
        <div class="mark">${esc(it.mark||"⭕")}</div>
        <div class="info"><div class="iname">${esc(it.name)} ${badges}</div><div class="hint">${esc(hint)}</div><div class="streakInfo">🔥${streak}日連続・累計${total}回${it.checked?(todayE&&todayE.confirmed?"・✅パパ既読":"・👀パパ未確認"):""}</div></div>
        <div class="checkBadge">✔</div>
      </div>`;
    attachHold(card, it);
    list.appendChild(card);
  });
  renderEventsInto("kidEventsList", "kidEventsSection", true);
}
function attachHold(card, it){
  const fill = card.querySelector(".fill");
  const durationMs = (it.holdSeconds || 3) * 1000;
  let startTime = null;
  const cancel = () => { if(holdRAF) cancelAnimationFrame(holdRAF); holdRAF = null; startTime = null; fill.style.width = "0%"; };
  const step = (ts) => {
    if(!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const pct = Math.min(100, elapsed / durationMs * 100);
    fill.style.width = pct + "%";
    if(pct >= 100){
      cancel();
      if(navigator.vibrate) navigator.vibrate(60);
      if(it.checked){ finalizeUncheck(it); }
      else if(it.quantityEnabled || it.photoEnabled){ openCompletionModal(it); }
      else { finalizeCheck(it, {}); }
      return;
    }
    holdRAF = requestAnimationFrame(step);
  };
  const start = (e) => { e.preventDefault(); cancel(); holdRAF = requestAnimationFrame(step); };
  card.addEventListener("pointerdown", start);
  card.addEventListener("pointerup", cancel);
  card.addEventListener("pointerleave", cancel);
  card.addEventListener("pointercancel", cancel);
}
async function finalizeCheck(it, extra){
  await updateDoc(doc(db,"papacheck_items", it.id), { checked: true, checkedAt: serverTimestamp() });
  const dateStr = todayStr();
  try{
    const q = query(collection(db,"papacheck_history"), where("itemId","==",it.id), where("dateStr","==",dateStr));
    const snap = await getDocs(q);
    if(snap.empty){
      await addDoc(collection(db,"papacheck_history"), {
        itemId: it.id, name: it.name, mark: it.mark||"⭕", dateStr,
        value: (extra.value ?? null), unit: it.quantityUnit || "", points: it.points ?? 1,
        photo: extra.photo || null, confirmed: false, ts: serverTimestamp()
      });
    }
  }catch(err){}
  toast(it.name + " できた！🎉");
  playSuccessSound();
  burstConfetti();
}
async function finalizeUncheck(it){
  await updateDoc(doc(db,"papacheck_items", it.id), { checked: false, checkedAt: serverTimestamp() });
  const dateStr = todayStr();
  try{
    const q = query(collection(db,"papacheck_history"), where("itemId","==",it.id), where("dateStr","==",dateStr));
    const snap = await getDocs(q);
    if(!snap.empty){
      const batch = writeBatch(db);
      snap.forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
  }catch(err){}
  toast(it.name + "をもどしたよ");
}

/* ---------------- Completion modal (quantity / photo) ---------------- */
function openCompletionModal(it){
  currentCompItem = it;
  compPhotoDataUrl = null;
  $("compModalTitle").textContent = it.name;
  $("compQuantityRow").style.display = it.quantityEnabled ? "flex" : "none";
  $("compQuantityLabel").textContent = "記録" + (it.quantityUnit ? "（" + it.quantityUnit + "）" : "");
  $("compQuantityInput").value = "";

function closeCompletionModal(){

}
$("compModalClose").addEventListener("click", closeCompletionModal);
$("compPhotoInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxW = 240;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width * scale; canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      compPhotoDataUrl = canvas.toDataURL("image/jpeg", 0.6);
      $("compPhotoPreview").src = compPhotoDataUrl;
      $("compPhotoPreview").style.display = "block";
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
$("compConfirmBtn").addEventListener("click", () => {

  const value = currentCompItem.quantityEnabled ? (parseFloat($("compQuantityInput").value)) : null;

});

/* ---------------- Calendar / Report toggle ---------------- */
$("segCal").addEventListener("click", () => {
  $("segCal").classList.add("on"); $("segReport").classList.remove("on");
  $("calSubView").style.display = "block"; $("reportSubView").style.display = "none";
  renderCalendar();
});
$("segReport").addEventListener("click", () => {
  $("segReport").classList.add("on"); $("segCal").classList.remove("on");

  renderReport();
});
$("repWeekBtn").addEventListener("click", () => { reportPeriod = 7; $("repWeekBtn").classList.add("on"); $("repMonthBtn").classList.remove("on"); renderReport(); });
$("repMonthBtn").addEventListener("click", () => { reportPeriod = 30; $("repMonthBtn").classList.add("on"); $("repWeekBtn").classList.remove("on"); renderReport(); });

function renderReport(){
  if(!$("view-calendar").classList.contains("active")) return;
  const days = [];
  for(let i=reportPeriod-1; i>=0; i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d);
  }
  let totalCount = 0, totalPoints = 0;
  const counts = days.map(d => {
    const ds = todayStr(d);
    const arr = historyMap[ds] || [];
    totalCount += arr.length;
    totalPoints += arr.reduce((s,e)=>s+(e.points||1),0);
    return { ds, d, count: arr.length };
  });
  $("repTotalCount").textContent = totalCount;
  $("repPoints").textContent = totalPoints;
  const max = Math.max(1, ...counts.map(c=>c.count));
  const chart = $("repBarChart");
  chart.innerHTML = "";
  counts.forEach(c => {
    const col = document.createElement("div"); col.className = "barCol";
    const h = Math.round(c.count / max * 100);
    const label = reportPeriod === 7 ? WEEKDAY_NAMES[c.d.getDay()] : (c.d.getMonth()+1)+"/"+c.d.getDate();
    col.innerHTML = `<div class="bar" style="height:${h}%;" title="${c.count}回"></div><div class="barLabel">${esc(label)}</div>`;
    chart.appendChild(col);
  });
}

/* ---------------- Calendar ---------------- */
function renderWeekdaysRow(){
  const row = $("calWeekdaysRow"); row.innerHTML = "";
  WEEKDAY_NAMES.forEach((w,i) => {
    const el = document.createElement("div");
    el.className = "calWeekday" + (i===0?" sun":i===6?" sat":"");
    el.textContent = w; row.appendChild(el);
  });
}
function renderCalendar(){
  if(!$("view-calendar").classList.contains("active")) return;
  const year = currentCalMonth.getFullYear(), month = currentCalMonth.getMonth();
  $("calMonthTitle").textContent = year + "年" + (month+1) + "月";
  renderWeekdaysRow();
  const grid = $("calGrid"); grid.innerHTML = "";
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startWeekday = firstDay.getDay();
  const todayS = todayStr();
  for(let i=0;i<startWeekday;i++){ const blank = document.createElement("div"); blank.className="calCell blank"; grid.appendChild(blank); }
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = year + "-" + String(month+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
    const holidayName = holidaysMap[dateStr];
    const chips = historyMap[dateStr] || [];
    const cell = document.createElement("div");
    cell.className = "calCell" + (holidayName?" holiday":"") + (dateStr===todayS?" today":"");
    cell.innerHTML = `<div class="dnum">${day}</div>` +
      (holidayName ? `<div class="hname">${esc(holidayName)}</div>` : "") +
      `<div class="chips">${chips.map(c=>`<span class="chip">${c.confirmed?"✅":"👀"}${c.photo?"📷":""}${esc(c.mark)}${esc(c.name)}${c.value!=null?(" "+esc(c.value)+esc(c.unit||"")):""}</span>`).join("")}</div>`;
    cell.addEventListener("click", () => openDayEdit(dateStr));
    grid.appendChild(cell);
  }
}
$("calPrevBtn").addEventListener("click", () => { currentCalMonth = new Date(currentCalMonth.getFullYear(), currentCalMonth.getMonth()-1, 1); renderCalendar(); });
$("calNextBtn").addEventListener("click", () => { currentCalMonth = new Date(currentCalMonth.getFullYear(), currentCalMonth.getMonth()+1, 1); renderCalendar(); });

/* ---------------- Admin: weekday chips ---------------- */
function buildWeekdayChips(selectedDays){
  const box = $("newItemDays"); box.innerHTML = "";
  WEEKDAY_NAMES.forEach((w,i) => {
    const b = document.createElement("button");
    b.type = "button"; b.className = "wdChip" + (selectedDays.has(i)?" on":"");

    b.addEventListener("click", () => { if(selectedDays.has(i)) selectedDays.delete(i); else selectedDays.add(i); b.classList.toggle("on"); });

buildWeekdayChips(adminSelectedDays);
$("newItemQtyEnabled").addEventListener("change", () => { $("newItemUnitRow").style.display = $("newItemQtyEnabled").checked ? "flex" : "none"; });

/* ---------------- Admin: item add/edit ---------------- */
function resetItemForm(){
  adminEditingId = null;
  $("itemFormTitle").textContent = "項目をついか";
  $("addItemBtn").textContent = "ついかする";
  $("cancelEditBtn").style.display = "none";
  $("newItemName").value=""; $("newItemMark").value=""; $("newItemHold").value=3; $("newItemPoints").value=1;
  $("newItemQtyEnabled").checked=false; $("newItemUnit").value=""; $("newItemUnitRow").style.display="none";
  $("newItemPhotoEnabled").checked=false;
  adminSelectedDays = new Set([0,1,2,3,4,5,6]);
  buildWeekdayChips(adminSelectedDays);
}
$("cancelEditBtn").addEventListener("click", resetItemForm);
$("addItemBtn").addEventListener("click", async () => {
  const name = $("newItemName").value.trim();
  const mark = $("newItemMark").value.trim() || "⭕";
  const hold = Math.max(1, parseInt($("newItemHold").value) || 3);
  const points = Math.max(0, parseInt($("newItemPoints").value) || 0);
  const qtyEnabled = $("newItemQtyEnabled").checked;
  const unit = $("newItemUnit").value.trim();
  const photoEnabled = $("newItemPhotoEnabled").checked;
  const days = Array.from(adminSelectedDays).sort();
  if(!name){ toast("名前を入力してね"); return; }
  if(days.length===0){ toast("曜日を1つ以上えらんでね"); return; }
  const payload = { name, mark, holdSeconds:hold, points, quantityEnabled:qtyEnabled, quantityUnit:unit, photoEnabled, days };
  if(adminEditingId){
    await updateDoc(doc(db,"papacheck_items", adminEditingId), payload);
    toast("こうしんしたよ");
  } else {
    const maxOrder = items.reduce((m,i)=>Math.max(m, i.order||0), 0);
    await addDoc(collection(db,"papacheck_items"), { ...payload, checked:false, order:maxOrder+1, createdAt: serverTimestamp() });
    toast("項目をついかしたよ");
  }
  resetItemForm();
});
function editItem(it){
  adminEditingId = it.id;
  $("itemFormTitle").textContent = "項目をへんしゅう";
  $("addItemBtn").textContent = "こうしんする";
  $("cancelEditBtn").style.display = "block";
  $("newItemName").value = it.name || "";
  $("newItemMark").value = it.mark || "";
  $("newItemHold").value = it.holdSeconds || 3;
  $("newItemPoints").value = it.points ?? 1;
  $("newItemQtyEnabled").checked = !!it.quantityEnabled;
  $("newItemUnit").value = it.quantityUnit || "";
  $("newItemUnitRow").style.display = it.quantityEnabled ? "flex" : "none";
  $("newItemPhotoEnabled").checked = !!it.photoEnabled;
  adminSelectedDays = new Set(it.days && it.days.length ? it.days : [0,1,2,3,4,5,6]);
  buildWeekdayChips(adminSelectedDays);
  $("view-admin").scrollTop = 0;
}
function renderAdminList(){
  const list = $("adminItemsList");
  if(!items.length){ list.innerHTML = '<div class="emptyNote">まだ項目がありません</div>'; return; }
  list.innerHTML = "";
  items.forEach((it, idx) => {
    const row = document.createElement("div"); row.className = "adminItem";
    const daysTxt = (it.days && it.days.length && it.days.length<7) ? it.days.map(d=>WEEKDAY_NAMES[d]).join("") : "毎日";
    const extras = [
      "長押し"+(it.holdSeconds||3)+"秒", (it.points??1)+"pt", daysTxt,
      it.quantityEnabled ? "数値記録("+(it.quantityUnit||"")+")" : "",
      it.photoEnabled ? "写真" : ""
    ].filter(Boolean).join("・");
    row.innerHTML = `<div class="mark">${esc(it.mark||"⭕")}</div>
      <div class="meta"><div class="n">${esc(it.name)}</div><div class="s">${esc(extras)}</div></div>
      <div class="ops">
        <button class="up" ${idx===0?"disabled":""}>↑</button>
        <button class="down" ${idx===items.length-1?"disabled":""}>↓</button>
        <button class="edit">✎</button>
        <button class="del">✕</button>
      </div>`;
    row.querySelector(".up").addEventListener("click", () => swapOrder(idx, idx-1));
    row.querySelector(".down").addEventListener("click", () => swapOrder(idx, idx+1));
    row.querySelector(".edit").addEventListener("click", () => editItem(it));
    row.querySelector(".del").addEventListener("click", () => deleteItem(it));
    list.appendChild(row);
  });
}
async function swapOrder(a, b){
  if(b<0 || b>=items.length) return;
  const itemA = items[a], itemB = items[b];
  await updateDoc(doc(db,"papacheck_items", itemA.id), { order: itemB.order });
  await updateDoc(doc(db,"papacheck_items", itemB.id), { order: itemA.order });
}
async function deleteItem(it){
  if(!confirm(it.name + " を削除しますか？")) return;
  await deleteDoc(doc(db,"papacheck_items", it.id));
  if(adminEditingId === it.id) resetItemForm();
}
$("resetAllBtn").addEventListener("click", async () => {
  if(!confirm("すべての項目を「未完了」に戻します。よろしいですか？")) return;
  const batch = writeBatch(db);
  const snap = await getDocs(collection(db,"papacheck_items"));
  snap.forEach(d => batch.update(d.ref, { checked:false }));
  await batch.commit();
  toast("リセットしたよ");
});

/* ---------------- Admin: special events ---------------- */
$("addEventBtn").addEventListener("click", async () => {
  const name = $("newEventName").value.trim();
  if(!name){ toast("イベント名を入力してね"); return; }
  const start = $("newEventStart").value || null;
  const end = $("newEventEnd").value || null;
  const maxOrder = events.reduce((m,e)=>Math.max(m, e.order||0), 0);
  await addDoc(collection(db,"papacheck_events"), { name, startDate:start, endDate:end, order:maxOrder+1, createdAt: serverTimestamp() });
  $("newEventName").value = ""; $("newEventStart").value = ""; $("newEventEnd").value = "";
  toast("イベントをついかしたよ");
});
function renderAdminEvents(){
  const box = $("adminEventsList");
  if(!events.length){ box.innerHTML = ""; return; }
  box.innerHTML = "";
  events.forEach(ev => {
    const tasks = tasksForEvent(ev.id);
    const dateTxt = [ev.startDate, ev.endDate].filter(Boolean).join(" 〜 ");
    const wrap = document.createElement("div");
    wrap.className = "eventAdminBlock";
    wrap.innerHTML = `
      <div class="adminItem">
        <div class="meta"><div class="n">🎉 ${esc(ev.name)}</div><div class="s">${esc(dateTxt||"期間なし")}・タスク${tasks.length}件</div></div>
        <div class="ops"><button class="del">✕</button></div>
      </div>
      <div class="eventTaskAdmin">
        <div class="addTaskRow"><input type="text" placeholder="タスク名（例：自主学習）" class="taskNameInput"><button class="taskAddBtn">追加</button></div>
        <div class="taskListAdmin">${tasks.map(t=>`<div class="taskAdminRow"><span>${t.checked?"✅":"⬜"} ${esc(t.name)}</span><button class="taskDelBtn" data-id="${t.id}">✕</button></div>`).join("")}</div>
      </div>`;
    wrap.querySelector(".del").addEventListener("click", async () => {
      if(!confirm(ev.name + " を削除しますか？関連タスクも全て削除されます")) return;
      const batch = writeBatch(db);
      tasks.forEach(t => batch.delete(doc(db,"papacheck_event_tasks", t.id)));
      batch.delete(doc(db,"papacheck_events", ev.id));
      await batch.commit();
    });
    wrap.querySelector(".taskAddBtn").addEventListener("click", async () => {
      const input = wrap.querySelector(".taskNameInput");
      const name = input.value.trim();
      if(!name) return;
      const maxOrder = tasks.reduce((m,t)=>Math.max(m, t.order||0), 0);
      await addDoc(collection(db,"papacheck_event_tasks"), { eventId: ev.id, name, checked:false, order:maxOrder+1, createdAt: serverTimestamp() });
      input.value = "";
    });
    wrap.querySelectorAll(".taskDelBtn").forEach(btn => {
      btn.addEventListener("click", async () => { await deleteDoc(doc(db,"papacheck_event_tasks", btn.dataset.id)); });
    });
    box.appendChild(wrap);
  });
}

/* ---------------- CSV export ---------------- */
$("exportCsvBtn").addEventListener("click", () => {
  const rows = [["日付","項目","記録値","単位","ポイント"]];
  Object.keys(historyMap).sort().forEach(ds => {
    historyMap[ds].forEach(e => { rows.push([ds, e.name, e.value ?? "", e.unit || "", e.points ?? 1]); });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF"+csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "papacheck_history.csv"; a.click();
  URL.revokeObjectURL(url);
  toast("CSVを書き出したよ");
});
